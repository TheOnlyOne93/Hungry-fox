<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hungry Fox</title>
<!--
  This little page just sends you straight to the game.

  It also fixes "stale game" problems: phones & tablets love to hang on
  to an old copy of a web page. So instead of opening  hungry-fox.html
  plainly, we open it with a one-time  ?v=<timestamp>  tag on the end.
  The browser sees a brand-new address every launch, so it can't hand
  back a cached old version — your son always gets the newest game with
  nothing to clear or refresh.

  The real game still lives in  hungry-fox.html  — that's the single
  file we tinker on together.
-->
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="canonical" href="hungry-fox.html">
<!-- no-JS fallback: still gets you into the game -->
<noscript><meta http-equiv="refresh" content="0; url=hungry-fox.html"></noscript>
<style>
  html,body{ height:100%; margin:0; }
  body{
    font-family:system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background:radial-gradient(120% 90% at 50% -10%, #ffe6c2, #ffd39a 55%, #ffbf80 100%);
    color:#3a2b1f;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; text-align:center; padding:20px;
  }
  a{ color:#e26f2c; font-weight:700; }
</style>
</head>
<body>
  <div style="font-size:52px">🦊</div>
  <p>Loading <b>Hungry Fox</b>…</p>
  <p>If it doesn't start, <a id="playLink" href="hungry-fox.html">tap here to play</a>.</p>
  <script>
    // Always fetch a fresh copy of the game (beats phone/tablet caching).
    var fresh = 'hungry-fox.html?v=' + Date.now();
    document.getElementById('playLink').href = fresh;   // manual link is fresh too
    location.replace(fresh);
  </script>
</body>
</html>
